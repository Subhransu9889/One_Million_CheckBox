<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Million CheckBox</title>
<style>
    :root {
        color-scheme: dark;
        --bg: #0b0f17;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.16);
        --text: #f7fafc;
        --accent: #27e0a3;
        --accent-strong: #00b87a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
        box-sizing: border-box;
    }

    html {
        min-height: 100%;
        background:
            radial-gradient(circle at 12% 10%, rgba(39, 224, 163, 0.18), transparent 26rem),
            radial-gradient(circle at 88% 0%, rgba(255, 209, 102, 0.14), transparent 22rem),
            linear-gradient(135deg, #08111d 0%, var(--bg) 48%, #101623 100%);
    }

    body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(24px, 5vw, 56px);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
    }

    h1 {
        width: min(100%, 980px);
        margin: 0;
        text-align: center;
        font-size: clamp(2.2rem, 7vw, 5.5rem);
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: capitalize;
        color: transparent;
        background: linear-gradient(90deg, #ffffff 0%, #b8ffe7 44%, #ffd166 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-wrap: balance;
        filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.36));
    }

    #container {
        width: min(100%, 980px);
        min-height: 300px;
        padding: clamp(18px, 3vw, 30px);
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
        gap: clamp(10px, 1.8vw, 16px);
        align-items: center;
        justify-items: center;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.055)),
            var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
    }

    input[type="checkbox"] {
        width: 24px;
        height: 24px;
        margin: 0;
        appearance: none;
        display: grid;
        place-content: center;
        border: 2px solid rgba(255, 255, 255, 0.34);
        border-radius: 6px;
        background: rgba(3, 8, 14, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    input[type="checkbox"]::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 3px;
        transform: scale(0);
        transition: transform 140ms ease;
        background: white;
        clip-path: polygon(14% 44%, 0 58%, 40% 100%, 100% 16%, 84% 0, 38% 64%);
    }

    input[type="checkbox"]:hover {
        transform: translateY(-2px);
        border-color: rgba(39, 224, 163, 0.72);
        box-shadow: 0 10px 24px rgba(39, 224, 163, 0.12);
    }

    input[type="checkbox"]:focus-visible {
        outline: 3px solid rgba(255, 209, 102, 0.45);
        outline-offset: 3px;
    }

    input[type="checkbox"]:checked {
        border-color: var(--accent);
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        box-shadow: 0 10px 24px rgba(39, 224, 163, 0.28);
    }

    input[type="checkbox"]:checked::before {
        transform: scale(1);
    }

    @media (max-width: 560px) {
        body {
            padding: 20px 14px;
            gap: 20px;
        }

        #container {
            grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
            padding: 16px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
        }
    }
</style>
</head>
<body>
    <h1>1 million checkbox</h1>
    <div id="container">
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const container = document.getElementById('container');
        const CHECKBOX_COUNT = 100;
        const socket = io();

        socket.on('server:checkbox-change', (data) => {
            console.log(`Received checkbox change from server: Checkbox ${data.id} is now ${data.checked ? 'checked' : 'unchecked'}`);
            const checkbox = document.getElementById(`checkbox-${data.id}`);
            if(checkbox){
                checkbox.checked = data.checked;
            }
        })
    
        new Array(CHECKBOX_COUNT).fill(null).forEach((_, idx) => {
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `checkbox-${idx}`;

            checkbox.addEventListener('change', (e) => {
                console.log(`Checkbox ${idx} is now ${e.target.checked ? 'checked' : 'unchecked'}`);
                socket.emit('client:checkbox-change', {
                    id: idx,
                    checked: e.target.checked
                })
            })

            container.appendChild(checkbox);
        })
    </script>
</body>
</html>
